[package]
name = "mssql-facade"
version = "0.1.0"
edition = "2021"
description = "Tiberius-style ergonomic facade over the mssql-tds crate"
license = "MIT"

[dependencies]
mssql-tds = { git = "https://github.com/microsoft/mssql-rs", default-features = false }
deadpool = "0.12"
chrono = "0.4"
rust_decimal = "1"
uuid = "1"
tokio = { version = "1", features = ["net"] }
serde_json = "1"
async-trait = "0.1"
thiserror = "2"
