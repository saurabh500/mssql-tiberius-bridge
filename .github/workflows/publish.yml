name: Publish to crates.io

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (validate without publishing)'
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish mssql-tiberius-bridge
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      contents: write
    if: github.actor == github.repository_owner

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Determine version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION"

      - name: Verify build
        run: cargo check

      - name: Dry run
        if: inputs.dry_run
        run: |
          cargo publish --dry-run
          echo "✅ Dry run passed for v${{ steps.version.outputs.version }}"

      - name: Publish
        if: "!inputs.dry_run"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish
          echo "✅ Published mssql-tiberius-bridge v${{ steps.version.outputs.version }}"

      - name: Tag release
        if: "!inputs.dry_run"
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"
          # release-plz.yml may have already pushed this tag; in that case
          # the publish step above still needs to run, but tagging is a
          # no-op. Only fail if the tag exists locally/remotely AND points
          # at a different commit than HEAD.
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            REMOTE_SHA=$(git ls-remote --tags origin "refs/tags/${TAG}" | awk '{print $1}')
            HEAD_SHA=$(git rev-parse HEAD)
            if [ "${REMOTE_SHA}" = "${HEAD_SHA}" ]; then
              echo "ℹ️  Tag ${TAG} already exists at ${REMOTE_SHA} (matches HEAD); skipping."
              exit 0
            else
              echo "::error::Tag ${TAG} already exists at ${REMOTE_SHA} but HEAD is ${HEAD_SHA}. Refusing to overwrite."
              exit 1
            fi
          fi
          git tag "${TAG}"
          git push origin "${TAG}"
          echo "🏷️  Tagged ${TAG}"
